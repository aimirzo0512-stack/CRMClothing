server:
  port: 8081

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/clothing_crm}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:12345}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      fail-on-empty-beans: false

app:
  jwt:
    secret: ${JWT_SECRET:ZmFrZS1zZWNyZXQta2V5LWZvci1jcm0tcHJvamVjdC1jaGFuZ2UtbWUtcGxlYXNl}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:*}
