version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clothingcrm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crmpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d clothingcrm"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/clothingcrm
      DB_USER: crm
      DB_PASS: crmpass
      JWT_SECRET: change-me-please-use-a-long-random-secret-string-here
      CORS_ORIGINS: "*"
    ports:
      - "8081:8081"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
