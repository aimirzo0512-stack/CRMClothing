<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Customers · Clothing CRM</title>
<link rel="stylesheet" href="../css/styles.css"/>
</head><body>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
requireAuth();
renderShell("customers", "Customers");

let state = { page: 0, size: 10, q: "" };

document.getElementById("page").innerHTML = `
  <div class="toolbar">
    <input id="q" class="form search" placeholder="Search by name or email..."/>
    <button class="btn secondary" id="searchBtn">Search</button>
    ${isAdmin() ? '<a class="btn right" href="customer-form.html">+ New customer</a>' : ''}
  </div>
  <div class="table-wrap"><table><thead><tr>
    <th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Registered</th><th>Points</th><th></th>
  </tr></thead><tbody id="rows"></tbody></table>
  <div class="pagination" id="pager"></div></div>`;

document.getElementById("searchBtn").onclick = () => {
  state.q = document.getElementById("q").value.trim(); state.page = 0; load();
};

async function load() {
  const data = await api(`/api/customers?page=${state.page}&size=${state.size}&q=${encodeURIComponent(state.q)}`);
  document.getElementById("rows").innerHTML = data.content.map(c => `
    <tr>
      <td>${c.id}</td><td>${c.fullName}</td><td>${c.email || ""}</td>
      <td>${c.phone || ""}</td><td>${c.registrationDate || ""}</td><td>${c.loyaltyPoints || 0}</td>
      <td class="row">
        ${isAdmin() ? `<a class="btn small secondary" href="customer-form.html?id=${c.id}">Edit</a>
        <button class="btn small danger" data-del="${c.id}">Delete</button>` : ''}
      </td>
    </tr>`).join("") || `<tr><td colspan="7" style="color:var(--muted)">No customers</td></tr>`;

  document.getElementById("pager").innerHTML = `
    <button class="btn small secondary" ${state.page<=0?"disabled":""} id="prev">Prev</button>
    <span>Page ${data.number+1} / ${Math.max(1,data.totalPages)}</span>
    <button class="btn small secondary" ${state.page+1>=data.totalPages?"disabled":""} id="next">Next</button>`;
  document.getElementById("prev").onclick = () => { state.page--; load(); };
  document.getElementById("next").onclick = () => { state.page++; load(); };
  document.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
    if (!confirm("Delete this customer?")) return;
    await api("/api/customers/" + b.dataset.del, { method: "DELETE" }); load();
  });
}
load().catch(e => alert(e.message));
</script>
</body></html>
