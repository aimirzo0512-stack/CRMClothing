<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>New Order · Clothing CRM</title>
<link rel="stylesheet" href="../css/styles.css"/>
</head><body>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
requireAuth();
renderShell("orders", "New order");

document.getElementById("page").innerHTML = `
  <form id="f" class="form" style="max-width:680px">
    <label>Customer
      <select name="customerId" id="customerId" required></select>
    </label>
    <h3 style="margin:8px 0 0;font-size:14px;color:var(--muted)">Items</h3>
    <div id="items"></div>
    <button type="button" class="btn secondary" id="addItem">+ Add item</button>
    <div class="row" style="margin-top:8px">
      <strong>Total: <span id="total">$0.00</span></strong>
      <button class="btn right" type="submit">Create order</button>
      <a class="btn secondary" href="orders.html">Cancel</a>
    </div>
  </form>`;

let products = [];
(async () => {
  const [custs, prods] = await Promise.all([api("/api/customers/all"), api("/api/products/all")]);
  products = prods;
  document.getElementById("customerId").innerHTML =
    `<option value="">-- select --</option>` + custs.map(c => `<option value="${c.id}">${c.fullName}</option>`).join("");
  addItem();
})();

function addItem() {
  const row = el(`<div class="row" style="gap:8px;margin-bottom:6px">
    <select class="form" data-product style="flex:2">
      <option value="">-- product --</option>
      ${products.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name} (${fmtMoney(p.price)}, stock ${p.stockQuantity})</option>`).join("")}
    </select>
    <input class="form" type="number" min="1" value="1" data-qty style="width:90px"/>
    <button type="button" class="btn small danger" data-rm>×</button>
  </div>`);
  row.querySelector("[data-rm]").onclick = () => { row.remove(); recalc(); };
  row.querySelector("[data-product]").onchange = recalc;
  row.querySelector("[data-qty]").oninput = recalc;
  document.getElementById("items").appendChild(row);
}
document.getElementById("addItem").onclick = addItem;

function recalc() {
  let total = 0;
  document.querySelectorAll("#items .row").forEach(r => {
    const sel = r.querySelector("[data-product]");
    const qty = parseInt(r.querySelector("[data-qty]").value || "0", 10);
    const price = parseFloat(sel.selectedOptions[0]?.dataset.price || "0");
    total += price * qty;
  });
  document.getElementById("total").textContent = fmtMoney(total);
}

document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const customerId = parseInt(document.getElementById("customerId").value, 10);
  if (!customerId) return alert("Select a customer");
  const items = [];
  document.querySelectorAll("#items .row").forEach(r => {
    const pid = parseInt(r.querySelector("[data-product]").value || "0", 10);
    const qty = parseInt(r.querySelector("[data-qty]").value || "0", 10);
    if (pid && qty > 0) items.push({ productId: pid, quantity: qty });
  });
  if (!items.length) return alert("Add at least one item");
  try {
    await api("/api/orders", { method: "POST", body: JSON.stringify({ customerId, items }) });
    location.href = "orders.html";
  } catch (err) { alert(err.message); }
});
</script>
</body></html>
