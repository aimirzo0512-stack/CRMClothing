<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Product Form · Clothing CRM</title>
<link rel="stylesheet" href="../css/styles.css"/>
</head><body>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
requireAuth();
if (!isAdmin()) { alert("Admins only"); location.href = "products.html"; }
const id = qsParam("id");
renderShell("products", id ? "Edit product" : "New product");

document.getElementById("page").innerHTML = `
  <form id="f" class="form" style="max-width:520px">
    <label>Name<input name="name" required/></label>
    <label>Category<input name="category"/></label>
    <label>Size<input name="size"/></label>
    <label>Color<input name="color"/></label>
    <label>Price<input name="price" type="number" step="0.01" required/></label>
    <label>Stock quantity<input name="stockQuantity" type="number" value="0" required/></label>
    <label>Description<textarea name="description" rows="3"></textarea></label>
    <div class="row">
      <button class="btn" type="submit">Save</button>
      <a class="btn secondary" href="products.html">Cancel</a>
    </div>
  </form>`;

(async () => {
  if (id) {
    const p = await api("/api/products/" + id);
    for (const [k,v] of Object.entries(p)) {
      const el = document.querySelector(`[name="${k}"]`); if (el) el.value = v ?? "";
    }
  }
})();

document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const fd = Object.fromEntries(new FormData(e.target));
  fd.price = parseFloat(fd.price); fd.stockQuantity = parseInt(fd.stockQuantity, 10);
  try {
    if (id) await api("/api/products/" + id, { method: "PUT", body: JSON.stringify(fd) });
    else    await api("/api/products",        { method: "POST", body: JSON.stringify(fd) });
    location.href = "products.html";
  } catch (err) { alert(err.message); }
});
</script>
</body></html>
