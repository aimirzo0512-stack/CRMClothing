<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login · Clothing CRM</title>
<link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Sign vkh b,jh,</h1>
    <p>Clothing Store-CRM</p>
    <div id="err"></div>
    <form id="f" class="form">
      <label>Username<input name="username" required/></label>
      <label>Password<input name="password" type="password" required/></label>
      <button class="btn" type="submit">Login</button>
      <p style="font-size:13px;color:var(--muted);margin:0">No account? <a href="register.html">Register</a></p>
    </form>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  try {
    const data = await api("/api/auth/login", {
      method: "POST",
      body: JSON.stringify({ username: fd.get("username"), password: fd.get("password") })
    });
    setAuth(data);
    location.href = "dashboard.html";
  } catch (err) {
    document.getElementById("err").innerHTML = `<div class="alert error">${err.message}</div>`;
  }
});
</script>
</body></html>
