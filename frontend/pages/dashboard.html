<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard · Clothing CRM</title>
<link rel="stylesheet" href="../css/styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
requireAuth();
renderShell("dashboard", "Dashboard");

(async () => {
  const page = document.getElementById("page");
  page.innerHTML = `<div id="cards" class="cards"></div>
    <div class="chart-wrap"><h3>Sales (last 14 days)</h3><canvas id="chart" height="90"></canvas></div>
    <div class="chart-wrap"><h3>Recent orders</h3>
      <div class="table-wrap"><table><thead><tr>
        <th>#</th><th>Customer</th><th>Date</th><th>Status</th><th>Total</th>
      </tr></thead><tbody id="recent"></tbody></table></div>
    </div>`;
  try {
    const s = await api("/api/dashboard/summary");
    const cards = [
      ["Customers", s.totalCustomers],
      ["Products",  s.totalProducts],
      ["Orders",    s.totalOrders],
      ["Revenue",   fmtMoney(s.totalRevenue)]
    ];
    document.getElementById("cards").innerHTML = cards.map(c =>
      `<div class="card"><div class="label">${c[0]}</div><div class="value">${c[1]}</div></div>`
    ).join("");

    document.getElementById("recent").innerHTML = (s.recentOrders || []).map(o => `
      <tr>
        <td>#${o.id}</td>
        <td>${o.customer ? o.customer.fullName : "—"}</td>
        <td>${fmtDate(o.orderDate)}</td>
        <td><span class="badge ${o.status}">${o.status}</span></td>
        <td>${fmtMoney(o.totalAmount)}</td>
      </tr>`).join("") || `<tr><td colspan="5" style="color:var(--muted)">No orders yet</td></tr>`;

    const labels = (s.salesChart || []).map(r => r.date);
    const values = (s.salesChart || []).map(r => Number(r.total));
    new Chart(document.getElementById("chart"), {
      type: "line",
      data: { labels, datasets: [{ label: "Sales", data: values, borderColor: "#5b8cff",
        backgroundColor: "rgba(91,140,255,.2)", fill: true, tension: .3 }] },
      options: { plugins: { legend: { labels: { color: "#e6e9ef" } } },
        scales: { x: { ticks: { color: "#8b94a7" } }, y: { ticks: { color: "#8b94a7" } } } }
    });
  } catch (e) {
    page.insertAdjacentHTML("afterbegin", `<div class="alert error">${e.message}</div>`);
  }
})();
</script>
</body></html>
