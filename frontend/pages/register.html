<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Register · Clothing CRM</title>
<link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Create account</h1>
    <p>Register a new CRM user</p>
    <div id="err"></div>
    <form id="f" class="form">
      <label>Full name<input name="fullName" required/></label>
      <label>Username<input name="username" required/></label>
      <label>Password<input name="password" type="password" required minlength="4"/></label>
      <label>Role
        <select name="role">
          <option value="EMPLOYEE">Employee</option>
          <option value="ADMIN">Admin</option>
        </select>
      </label>
      <button class="btn" type="submit">Register</button>
      <p style="font-size:13px;color:var(--muted);margin:0">Already have one? <a href="login.html">Login</a></p>
    </form>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  try {
    const data = await api("/api/auth/register", {
      method: "POST",
      body: JSON.stringify({
        fullName: fd.get("fullName"), username: fd.get("username"),
        password: fd.get("password"), role: fd.get("role")
      })
    });
    setAuth(data); location.href = "dashboard.html";
  } catch (err) {
    document.getElementById("err").innerHTML = `<div class="alert error">${err.message}</div>`;
  }
});
</script>
</body></html>
